# ============================================
# APPLICATION
# ============================================
spring.application.name=notification-service
server.port=8082

# ============================================
# KAFKA CONSUMER
# ============================================
# Endereço do broker Kafka (docker-compose)
spring.kafka.bootstrap-servers=localhost:9092

# Serialização: recebe objetos JSON e converte para Java
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# Configuração do deserializador JSON
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.type.mapping=OrderCompletedEvent:com.tcc.notification.event.OrderCompletedEvent,OrderFailedEvent:com.tcc.notification.event.OrderFailedEvent

# Group ID: identifica este consumidor no Kafka
spring.kafka.consumer.group-id=notification-service-group

# Offset: earliest = lê desde o início se não houver offset salvo
spring.kafka.consumer.auto-offset-reset=earliest

# Commit automático de offsets
spring.kafka.consumer.enable-auto-commit=true

# ============================================
# ACTUATOR (Health & Metrics)
# ============================================
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always

# ============================================
# AWS SES CONFIGURATION (Simple Email Service)
# ============================================
# Modo: LOCAL (LocalStack) ou AWS (SES real)
# LOCAL = usa LocalStack para simular (não envia email real)
# AWS = usa AWS SES real (envia email de verdade!)
aws.ses.mode=AWS

# Endpoint do LocalStack (usado apenas quando mode=LOCAL)
aws.ses.localstack.endpoint=http://localhost:4566

# Região AWS
aws.ses.region=sa-east-1

# Credenciais AWS (apenas para mode=AWS)
# IMPORTANTE: Em produção, use variáveis de ambiente ou AWS credentials file
aws.ses.access-key=AKIAY4YB7EOD2SKXYN75
aws.ses.secret-key=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

# Email remetente (deve ser verificado no SES)
aws.ses.from-email=kelwinpferreira@gmail.com

# Email destinatário para testes (no Sandbox, deve ser verificado)
aws.ses.to-email=kelwinpferreira@gmail.com

# Habilita/desabilita o envio de emails
aws.ses.enabled=true

# ============================================
# NOTIFICATION SIMULATION (Experimental)
# ============================================
# Simulação de falha: ativa falha proposital no envio de notificação
# Valores: true | false
notification.simulation.failure.enabled=false

# Taxa de falha (0.0 a 1.0): probabilidade de falhar
# Exemplo: 0.2 = 20% de chance de falha
notification.simulation.failure.rate=0.0

# Simulação de latência: ativa delay artificial no processamento
# Valores: true | false
notification.simulation.latency.enabled=true

# Latência mínima em ms
notification.simulation.latency.min-ms=50

# Latência máxima em ms
notification.simulation.latency.max-ms=200

# ============================================
# LOGGING
# ============================================
# Nível de log para o pacote da aplicação
logging.level.com.tcc.notification=INFO

# Formato de log para melhor rastreabilidade
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
